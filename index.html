<!DOCTYPE html>
<html>
<head>
<title>BFHL Challenge</title>
<style>
body{font-family:Arial;padding:30px;background:#f4f4f4}
textarea{width:100%;height:120px}
button{padding:10px 20px;margin-top:10px}
pre{background:white;padding:15px}
</style>
</head>
<body>
<h2>Chitkara Full Stack Challenge</h2>
<p>Enter JSON Array (Example: ["A->B","B->C"])</p>
<textarea id="data"></textarea><br>
<button onclick="submitData()">Submit</button>
<pre id="out"></pre>

<script>
const API_BASE_URL = "https://bajaj-p-backend.onrender.com";

async function submitData(){
 const arr = JSON.parse(document.getElementById("data").value);
 const res = await fetch(`${API_BASE_URL}/bfhl`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({data:arr})
 });
 const json = await res.json();
 document.getElementById("out").textContent =
   JSON.stringify(json,null,2);
}
</script>
</body>
</html>
